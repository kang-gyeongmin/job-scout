# 지원 가능한 "최소 요구 경력" 상한(년). 원티드·점핏 수집기에서 이 값을 넘는
# 공고(예: 최소 3년 요구하는 "3~10년")를 제외한다. 0=신입만, 1=1년 이하 허용.
